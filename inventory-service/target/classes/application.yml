server:
  port: 8083

spring:
  application:
    name: inventory-service
  threads:
    virtual:
      enabled: true

  datasource:
    url: jdbc:postgresql://localhost:5432/platform_db
    username: platform
    password: platform
    hikari:
      pool-name: HikariPool-InventoryService
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 3000

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    table: flyway_schema_history_inventory

  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2s

  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: inventory-service-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.platform.*"
    listener:
      concurrency: 3

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus,metrics,threaddump
  metrics:
    tags:
      service: inventory-service

# Inventory strategy selection (switch to demonstrate different locking approaches)
# Values: UNSAFE | SYNCHRONIZED | PESSIMISTIC | OPTIMISTIC | REDIS
platform:
  inventory:
    reservation-strategy: PESSIMISTIC
    cache:
      ttl-seconds: 300  # set to 10 for cache stampede demo (Scenario 5)

logging:
  level:
    com.platform: DEBUG
  config: classpath:logback-spring.xml
