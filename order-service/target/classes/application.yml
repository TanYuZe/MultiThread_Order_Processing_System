server:
  port: 8081
  tomcat:
    threads:
      max: 200   # switch to 10 for thread starvation demo (Task 4.6)

spring:
  application:
    name: order-service

  # Java 21 Virtual Threads — switch to false for platform thread comparison (Task 2.5)
  threads:
    virtual:
      enabled: true

  datasource:
    url: jdbc:postgresql://localhost:5432/platform_db
    username: platform
    password: platform
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: HikariPool-OrderService
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 3000
      idle-timeout: 600000
      max-lifetime: 1800000
      # Uncomment to demonstrate connection pool exhaustion (Scenario 1):
      # maximum-pool-size: 5
      # connection-timeout: 3000

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        # Log slow queries (> 1 second) — useful during load tests:
        session.events.log.LOG_QUERIES_SLOWER_THAN_MS: 1000

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3
      properties:
        spring.json.add.type.headers: false
    consumer:
      group-id: order-service-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.platform.*"
    listener:
      concurrency: 3  # 3 consumer threads (one per partition group)
      ack-mode: manual

  task:
    execution:
      pool:
        core-size: 10
        max-size: 50
        queue-capacity: 100  # deliberately small — demonstrates backpressure when full
        keep-alive: 60s
        thread-name-prefix: "order-async-"
      shutdown:
        await-termination: true
        await-termination-period: 30s
    scheduling:
      pool:
        size: 2
        thread-name-prefix: "order-sched-"

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics,threaddump,heapdump
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      service: order-service
    distribution:
      percentiles-histogram:
        http.server.requests: true
      percentiles:
        http.server.requests: 0.5,0.95,0.99

logging:
  level:
    com.platform: DEBUG
    org.springframework.kafka: INFO
    org.hibernate.SQL: INFO
  config: classpath:logback-spring.xml

# Outbox poller configuration
platform:
  outbox:
    poll-interval-ms: 1000
    batch-size: 100
