server:
  port: 8084

spring:
  application:
    name: notification-service
  threads:
    virtual:
      enabled: true

  datasource:
    url: jdbc:postgresql://localhost:5432/platform_db
    username: platform
    password: platform
    hikari:
      pool-name: HikariPool-NotifService
      maximum-pool-size: 15
      minimum-idle: 3
      connection-timeout: 3000

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration

  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: notification-service-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.platform.*"
        # Tune max.poll.records to control backpressure (Task 5.2):
        max.poll.records: 10    # set to 500 for consumer lag demo
    listener:
      concurrency: 3
      ack-mode: manual

  task:
    execution:
      pool:
        # Intentionally small queue to demonstrate backpressure (Task 5.2):
        core-size: 5
        max-size: 10
        queue-capacity: 500
        thread-name-prefix: "notif-async-"

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus,metrics
  metrics:
    tags:
      service: notification-service

platform:
  notification:
    max-attempts: 3
    channels:
      sms:
        delay-ms: 100       # set to 2000 for consumer lag demo (Task 5.2 / Scenario 4)
        failure-rate: 0.0   # set to 1.0 to simulate SMS outage
      email:
        delay-ms: 50
        failure-rate: 0.0
      push:
        delay-ms: 20
        failure-rate: 0.0

logging:
  level:
    com.platform: DEBUG
  config: classpath:logback-spring.xml
